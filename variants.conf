# Adwaita-colors variant configuration

# Scalable subdirectories from system Adwaita to copy (the accent-colored icon set)
ADWAITA_DIRS="places status"

# SVGs to exclude from variants even if they have accent blues
# These have blue in non-accent contexts (monitor screens, etc.)
SKIP_FILES=(
  "places/network-workgroup.svg"
  "places/network-server.svg"
  "places/user-trash.svg"
)

# System Adwaita search paths (in priority order)
ADWAITA_PATHS=(
    "/usr/share/icons/Adwaita"
    "/usr/local/share/icons/Adwaita"
    "/var/usr/local/share/icons/Adwaita"
    "$HOME/.local/share/icons/Adwaita"
    "$HOME/.icons/Adwaita"
)

# Color mappings per variant
# Format: variant "srchex:dsthex srchex:dsthex ..."
# Only the 6 accent-blue colors are mapped:
#   DARK:  #3f8ae5  #438de6  #62a0ea
#   LIGHT: #a4caee  #afd4ff  #c0d5ea

declare -A COLOR_MAP
COLOR_MAP[teal]="3f8ae5:129eb0 438de6:129eb0 62a0ea:129eb0 a4caee:9edae6 afd4ff:9edae6 c0d5ea:9edae6"
COLOR_MAP[brown]="3f8ae5:a5734b 438de6:a5734b 62a0ea:a5734b a4caee:d5b69a afd4ff:d5b69a c0d5ea:d5b69a"
COLOR_MAP[green]="3f8ae5:3d9e4f 438de6:3d9e4f 62a0ea:3d9e4f a4caee:8ee697 afd4ff:8ee697 c0d5ea:8ee697"
COLOR_MAP[orange]="3f8ae5:f17738 438de6:f17738 62a0ea:f17738 a4caee:ffc994 afd4ff:ffc994 c0d5ea:ffc994"
COLOR_MAP[pink]="3f8ae5:e64392 438de6:e64392 62a0ea:e64392 a4caee:eea4c8 afd4ff:eea4c8 c0d5ea:eea4c8"
COLOR_MAP[purple]="3f8ae5:954ab5 438de6:954ab5 62a0ea:954ab5 a4caee:d099d6 afd4ff:d099d6 c0d5ea:d099d6"
COLOR_MAP[red]="3f8ae5:e84053 438de6:e84053 62a0ea:e84053 a4caee:f2a1a5 afd4ff:f2a1a5 c0d5ea:f2a1a5"
COLOR_MAP[slate]="3f8ae5:637692 438de6:637692 62a0ea:637692 a4caee:b1cae1 afd4ff:b1cae1 c0d5ea:b1cae1"
COLOR_MAP[yellow]="3f8ae5:cb931a 438de6:cb931a 62a0ea:cb931a a4caee:f3d796 afd4ff:f3d796 c0d5ea:f3d796"

# Blue variant (identity, no color change)
COLOR_MAP[blue]=""

# All variants
ALL_VARIANTS=(blue teal brown green orange pink purple red slate yellow)

# Mimetype symlinks (aliases for file types without dedicated Adwaita icons)
# Format: "linkname.svg:target.svg"
MIMETYPE_SYMLINKS=(
  # Category 1 — document aliases (target x-office-document.svg in system Adwaita)
  "application-vnd.google-apps.document.svg:x-office-document.svg"
  "application-vnd.insync.link.drive.doc.svg:x-office-document.svg"
  "application-vnd.ms-word.document.macroenabled.12.svg:x-office-document.svg"
  "application-vnd.ms-word.svg:x-office-document.svg"
  "application-vnd.oasis.opendocument.text.svg:x-office-document.svg"
  "gddoc.svg:x-office-document.svg"
  "libreoffice-oasis-text.svg:x-office-document.svg"
  "libreoffice-text.svg:x-office-document.svg"
  "openoffice4-oasis-text.svg:x-office-document.svg"

  # Category 2 — presentation aliases (target oasis-presentation.svg)
  "application-vnd.google-apps.presentation.svg:oasis-presentation.svg"
  "application-vnd.insync.link.drive.slides.svg:oasis-presentation.svg"
  "application-vnd.ms-powerpoint.presentation.macroEnabled.12.svg:oasis-presentation.svg"
  "application-vnd.ms-powerpoint.svg:oasis-presentation.svg"
  "application-vnd.openxmlformats-officedocument.presentationml.presentation.svg:oasis-presentation.svg"
  "application-vnd.openxmlformats-officedocument.presentationml.slideshow.svg:oasis-presentation.svg"
  "application-x-kpresenter.svg:oasis-presentation.svg"
  "gdslides.svg:oasis-presentation.svg"
  "libreoffice-oasis-presentation.svg:oasis-presentation.svg"
  "libreoffice-presentation.svg:oasis-presentation.svg"
  "openoffice4-oasis-presentation.svg:oasis-presentation.svg"
  "openoffice4-presentation.svg:oasis-presentation.svg"

  # Category 3 — web document aliases (target oasis-web.svg)
  "application-vnd.google-apps.site.svg:oasis-web.svg"
  "libreoffice-oasis-web.svg:oasis-web.svg"
  "libreoffice-web.svg:oasis-web.svg"

  # Category 4 — 3D model aliases (target application-x-model.svg)
  "model-obj.svg:application-x-model.svg"
  "model-stl.svg:application-x-model.svg"
  "model-x-stl-binary.svg:application-x-model.svg"
  "model-x.stl-ascii.svg:application-x-model.svg"
  "model-x.stl-binary.svg:application-x-model.svg"
)
